<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Form Persona</title>
</head>
<body>

<h2>Inserisci i tuoi dati</h2>

<form id="formPersona">
    <label>Nome:</label>
    <input type="text" id="nome" required><br><br>

    <label>Cognome:</label>
    <input type="text" id="cognome" required><br><br>

    <label>Età:</label>
    <input type="number" id="eta" required><br><br>

    <button type="submit">Invia</button>
</form>

<p id="risultato"></p>

<script>
document.getElementById("formPersona").addEventListener("submit", function(event) {
    event.preventDefault();

    let nome = document.getElementById("nome").value.trim();
    let cognome = document.getElementById("cognome").value.trim();
    let eta = document.getElementById("eta").value;

    // Validazione
    if (nome === "" || cognome === "" || eta === "") {
        alert("Compila tutti i campi!");
        return;
    }

    if (eta <= 0 || eta>100) {
        alert("Inserisci un'età valida!");
        return;
    }

    // Creazione oggetto
    let persona = {
        nome: nome,
        cognome: cognome,
        eta: Number(eta)
    };

    // Stampa in console
    console.log(persona);

    // Stampa a schermo
    document.getElementById("risultato").textContent =
        "Persona creata: " + nome + " " + cognome + ", età " + eta;
});
</script>

</body>
</html>
