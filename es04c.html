<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Calcolatrice</title>
</head>

<body>

<h2>Calcolatrice</h2>

<!-- form per inserire i dati -->
<form id="calcForm">

Numero 1:
<input type="text" id="num1"><br><br>

Operazione (+ - * /):
<input type="text" id="operazione"><br><br>

Numero 2:
<input type="text" id="num2"><br><br>

<button type="button" onclick="calcola()">Calcola</button>

</form>

<p id="risultato"></p>

<script>

// funzione che viene eseguita quando si clicca il bottone
function calcola() {

let n1 = parseFloat(document.getElementById("num1").value);
let n2 = parseFloat(document.getElementById("num2").value);
let op = document.getElementById("operazione").value;

let risultato;

// controllo se i numeri sono validi
if (isNaN(n1) || isNaN(n2)) {
    document.getElementById("risultato").innerText = "Errore: inserisci numeri validi";
    return;
}

// controllo operazione
if (op === "+") {
    risultato = n1 + n2;
}
else if (op === "-") {
    risultato = n1 - n2;
}
else if (op === "*") {
    risultato = n1 * n2;
}
else if (op === "/") {

    // controllo divisione per zero
    if (n2 === 0) {
        document.getElementById("risultato").innerText = "Errore: impossibile dividere per 0";
        return;
    }

    risultato = n1 / n2;
}
else {
    document.getElementById("risultato").innerText = "Operazione non valida";
    return;
}

// controllo risultato non valido (NaN o Infinity)
if (!isFinite(risultato)) {
    document.getElementById("risultato").innerText = "Errore nel calcolo";
    return;
}

// stampa risultato
document.getElementById("risultato").innerText = "Risultato: " + risultato;

}

</script>

</body>
</html>
